# موقع جذع — استضافة ثابتة (بدون build)

[build]
  command = ""
  publish = "."

# ── Clean URLs: ربط الصفحات الرئيسية بدون امتداد .html ──
[[redirects]]
  from = "/donation"
  to = "/donation.html"
  status = 200

[[redirects]]
  from = "/articles"
  to = "/articles.html"
  status = 200

[[redirects]]
  from = "/projects"
  to = "/projects.html"
  status = 200

[[redirects]]
  from = "/article"
  to = "/article.html"
  status = 200

[[redirects]]
  from = "/project"
  to = "/project.html"
  status = 200

[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200

# ── لوحة التحكم: التوجيه إلى login.html عند /admin ──
[[redirects]]
  from = "/admin"
  to = "/admin/login.html"
  status = 302

# ── Admin Clean URLs (بدون .html) ──
[[redirects]]
  from = "/admin/login"
  to = "/admin/login.html"
  status = 200

[[redirects]]
  from = "/admin/dashboard"
  to = "/admin/dashboard.html"
  status = 200

[[redirects]]
  from = "/admin/articles"
  to = "/admin/articles.html"
  status = 200

[[redirects]]
  from = "/admin/projects"
  to = "/admin/projects.html"
  status = 200

[[redirects]]
  from = "/admin/services"
  to = "/admin/services.html"
  status = 200

[[redirects]]
  from = "/admin/reviews"
  to = "/admin/reviews.html"
  status = 200

[[redirects]]
  from = "/admin/messages"
  to = "/admin/messages.html"
  status = 200

[[redirects]]
  from = "/admin/donations"
  to = "/admin/donations.html"
  status = 200

[[redirects]]
  from = "/admin/settings"
  to = "/admin/settings.html"
  status = 200

# ── Static files passthrough ──
[[redirects]]
  from = "/admin/*.html"
  to = "/admin/:splat.html"
  status = 200

[[redirects]]
  from = "/client/*"
  to = "/client/:splat"
  status = 200

# ── 404 Fallback ──
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # إضافة 'self' لـ frame-src لتمكين srcdoc iframes — ضروري لميزة رفع HTML
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://unpkg.com https://cdn.quilljs.com https://cdn.jsdelivr.net https://www.googletagmanager.com https://www.google-analytics.com https://vercel.live; style-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com https://cdn.quilljs.com https://cdn.jsdelivr.net https://vercel.live; img-src 'self' data: blob: https:; font-src 'self' data: https://cdnjs.cloudflare.com https://cdn.quilljs.com https://cdn.jsdelivr.net https://vercel.live; connect-src 'self' https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com https://*.cloudfunctions.net wss://*.firebaseio.com wss://*.googleapis.com https://www.gstatic.com https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://firestore.googleapis.com https://firebase.googleapis.com https://firebaseinstallations.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://vercel.live wss://vercel.live; frame-src 'self' https://vercel.live; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/client/*"
  [headers.values]
    Cache-Control = "no-cache"
