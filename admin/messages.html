<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../assets/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <title>الرسائل الواردة - جذع</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body>

    <aside class="sidebar">
        <div style="text-align: center; margin-bottom: 10px;"><img src="../assets/logo.png" alt="جذع" style="width: 50px;"></div>
        <h2>إدارة جذع</h2>
        <a href="dashboard">لوحة التحكم</a>
        <a href="articles">المقالات</a>
        <a href="projects">المشاريع</a>
        <a href="services">الخدمات</a>
        <a href="reviews">آراء العملاء</a>
        <a href="messages" class="active">صندوق الوارد</a>
        <a href="donations">طرق الدعم</a>
        <a href="settings">الإعدادات</a>
        <button id="logout-btn">تسجيل الخروج</button>
    </aside>

    <main class="main-content">
        <h1>صندوق الوارد (رسائل الزوار)</h1>

        <div class="card">
            <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>المرسل</th>
                        <th>البريد الإلكتروني</th>
                        <th>التاريخ</th>
                        <th>الرسالة</th>
                        <th style="width: 100px;">إجراءات</th>
                    </tr>
                </thead>
                <tbody id="messages-list">
                    <tr><td colspan="5" style="text-align:center;">جاري تحميل الرسائل...</td></tr>
                </tbody>
            </table>
            </div>
        </div>
    </main>

    <script src="../js/admin.js"></script>
    <script type="module">
        import { auth, onAuthStateChanged, signOut, db, collection, deleteDoc, doc, onSnapshot, query, orderBy } from '../firebase/firebase.js';
        import { escapeHtml } from '../js/security.js?v=12';
        import { renderLongTextCell, bindViewTextButtons } from '../js/admin-ui.js';

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'login';
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        const q = query(collection(db, 'messages'), orderBy('date', 'desc'));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('messages-list');
            if (snapshot.empty) {
                list.innerHTML = '<tr><td colspan="5" style="text-align: center;">لا توجد رسائل جديدة.</td></tr>';
                return;
            }
            list.innerHTML = '';
            snapshot.forEach((documentSnap) => {
                const data = documentSnap.data();
                const d = new Date(data.date);
                const dateStr = d.toLocaleDateString('ar-EG') + ' ' + d.toLocaleTimeString('ar-EG');
                const safeName = escapeHtml(data.name || '—');
                const safeEmail = escapeHtml(data.email || '');
                const meta = `<p><strong>من:</strong> ${safeName} · <a href="mailto:${safeEmail}">${safeEmail}</a></p><p><strong>التاريخ:</strong> <span dir="ltr">${escapeHtml(dateStr)}</span></p>`;
                const msgCell = renderLongTextCell(data.message, 'الرسالة كاملة', meta, 80);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${safeName}</strong></td>
                    <td><a href="mailto:${safeEmail}" dir="ltr" style="color:var(--admin-primary);">${safeEmail}</a></td>
                    <td><span dir="ltr">${escapeHtml(dateStr)}</span></td>
                    <td class="table-text-cell">${msgCell}</td>
                    <td><div class="table-actions"><button type="button" class="btn btn-danger btn-sm" data-delete-id="${documentSnap.id}">حذف</button></div></td>
                `;
                list.appendChild(row);
            });

            bindViewTextButtons(list);
            list.querySelectorAll('[data-delete-id]').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    if (confirm('هل أنت متأكد من حذف هذه الرسالة نهائياً؟')) {
                        await deleteDoc(doc(db, 'messages', btn.dataset.deleteId));
                    }
                });
            });
        });
    </script>
</body>

</html>
