<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../assets/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <title>إدارة آراء العملاء - جذع</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <aside class="sidebar">
        <div style="text-align: center; margin-bottom: 10px;"><img src="../assets/logo.png" alt="جذع" style="width: 50px;"></div>
        <h2>إدارة جذع</h2>
        <a href="dashboard">لوحة التحكم</a>
        <a href="articles">المقالات</a>
        <a href="projects">المشاريع</a>
        <a href="services">الخدمات</a>
        <a href="reviews" class="active">آراء العملاء</a>
        <a href="messages">صندوق الوارد</a>
        <a href="donations">طرق الدعم</a>
        <a href="settings">الإعدادات</a>
        <button id="logout-btn">تسجيل الخروج</button>
    </aside>

    <main class="main-content">
        <h1>إدارة آراء العملاء</h1>

        <div class="card">
            <h3>مشاركة رابط كتابة الرأي</h3>
            <p>أرسل هذا الرابط لعملائك — لا يحتاجون حساباً أو كلمة مرور:</p>
            <div class="share-link" id="review-link"></div>
        </div>

        <div class="card">
            <h3>الآراء المكتوبة</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>العميل</th>
                            <th>الخدمة</th>
                            <th>الرأي</th>
                            <th>إظهار؟</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="reviews-list"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../js/admin.js"></script>
    <script type="module">
        import { auth, onAuthStateChanged, signOut, db, collection, updateDoc, deleteDoc, doc, onSnapshot } from '../firebase/firebase.js';
        import { escapeHtml } from '../js/security.js';
        import { renderLongTextCell, bindViewTextButtons } from '../js/admin-ui.js';

        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = 'login'; });
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        const base = window.location.origin + window.location.pathname.replace(/admin\/reviews\.html$/, '');
        document.getElementById('review-link').textContent = base + 'client/write-review.html';

        onSnapshot(collection(db, 'reviews'), (snapshot) => {
            const list = document.getElementById('reviews-list');
            if (snapshot.empty) {
                list.innerHTML = '<tr><td colspan="5" style="text-align:center;">لا توجد آراء بعد.</td></tr>';
                return;
            }
            list.innerHTML = '';
            snapshot.forEach((documentSnap) => {
                const data = documentSnap.data();
                const id = documentSnap.id;
                const safeName = escapeHtml(data.clientName || '—');
                const safeService = escapeHtml(data.serviceName || '');
                const serviceCell = safeService ? `<span class="service-tag">${safeService}</span>` : '—';
                const meta = `<p><strong>العميل:</strong> ${safeName}</p>${safeService ? `<p><strong>الخدمة:</strong> ${safeService}</p>` : ''}`;
                const reviewCell = renderLongTextCell(data.reviewText, 'الرأي كاملاً', meta, 80);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${safeName}</strong></td>
                    <td>${serviceCell}</td>
                    <td class="table-text-cell">${reviewCell}</td>
                    <td>
                        <label class="switch">
                            <input type="checkbox" class="review-visible-toggle" data-review-id="${id}" ${data.visible ? 'checked' : ''}>
                            <span class="slider-toggle"></span>
                        </label>
                    </td>
                    <td><div class="table-actions"><button type="button" class="btn btn-danger btn-sm" data-delete-id="${id}">حذف</button></div></td>
                `;
                list.appendChild(row);
            });

            bindViewTextButtons(list);

            list.querySelectorAll('.review-visible-toggle').forEach((input) => {
                input.addEventListener('change', async () => {
                    await updateDoc(doc(db, 'reviews', input.dataset.reviewId), { visible: input.checked });
                });
            });

            list.querySelectorAll('[data-delete-id]').forEach((btn) => {
                btn.addEventListener('click', async () => {
                    if (confirm('هل أنت متأكد من حذف هذا الرأي؟')) {
                        await deleteDoc(doc(db, 'reviews', btn.dataset.deleteId));
                    }
                });
            });
        });
    </script>
</body>
</html>
