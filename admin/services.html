<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../assets/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <title>إدارة الخدمات - جذع</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <aside class="sidebar">
        <div style="text-align: center; margin-bottom: 10px;"><img src="../assets/logo.png" alt="جذع" style="width: 50px;"></div>
        <h2>إدارة جذع</h2>
        <a href="dashboard">لوحة التحكم</a>
        <a href="articles">المقالات</a>
        <a href="projects">المشاريع</a>
        <a href="services" class="active">الخدمات</a>
        <a href="reviews">آراء العملاء</a>
        <a href="messages">صندوق الوارد</a>
        <a href="donations">طرق الدعم</a>
        <a href="settings">الإعدادات</a>
        <button id="logout-btn">تسجيل الخروج</button>
    </aside>

    <main class="main-content">
        <h1>إدارة الخدمات</h1>
        
        <div class="card">
            <h3 id="form-title">إضافة خدمة جديدة</h3>
            <form id="add-service-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>عنوان الخدمة</label>
                    <input type="text" id="service-title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>الرابط الإنجليزي (Slug) - يجب أن يكون فريداً</label>
                    <input type="text" id="service-slug" class="form-control" placeholder="مثال: custom-development" dir="ltr" required>
                </div>
                <div class="form-group">
                    <label>الوصف</label>
                    <textarea id="service-desc" class="form-control" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="service-featured">
                        خدمة مميزة (تظهر في الرئيسية)
                    </label>
                </div>
                <div class="form-actions" style="margin-top: 15px;">
                    <button type="submit" class="btn" id="submit-btn">إضافة</button>
                    <button type="button" class="btn btn-danger" id="cancel-edit-btn" style="display:none;">إلغاء التعديل</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h3>قائمة الخدمات</h3>
            <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>العنوان</th>
                        <th>مميزة</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="services-list">
                    <!-- Loaded dynamically -->
                </tbody>
            </table>
            </div>
        </div>
    </main>

    <script src="../js/admin.js"></script>
    <script type="module">
        import { auth, onAuthStateChanged, signOut, db, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, query, where, getDocs, limit } from '../firebase/firebase.js';
        import { translateFirebaseError } from '../js/admin-ui.js';
        import { escapeHtml, sanitizePlainText } from '../js/security.js';

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'login';
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        let currentServices = {};

        // Real-time Load services
        const servicesQuery = query(collection(db, "services"), limit(20));
        onSnapshot(servicesQuery, (snapshot) => {
            const servicesList = document.getElementById('services-list');
            servicesList.innerHTML = '';
            currentServices = {};
            if (snapshot.empty) {
                servicesList.innerHTML = '<tr><td colspan="3" style="text-align: center;">لا توجد خدمات.</td></tr>';
                return;
            }
            snapshot.forEach((documentSnap) => {
                const data = documentSnap.data();
                currentServices[documentSnap.id] = data;
                servicesList.innerHTML += `
                    <tr>
                        <td>${escapeHtml(data.title)}</td>
                        <td>${data.featured ? '✅ نعم' : '❌ لا'}</td>
                        <td>
                            <div class="table-actions">
                                <button class="btn btn-sm" onclick="editService('${documentSnap.id}')">تعديل</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteService('${documentSnap.id}')">حذف</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        });

        window.deleteService = async (id) => {
            if(confirm('هل أنت متأكد من الحذف؟')) {
                await deleteDoc(doc(db, "services", id));
            }
        };

        window.editService = (id) => {
            const data = currentServices[id];
            if (!data) return;
            document.getElementById('edit-id').value = id;
            document.getElementById('service-title').value = data.title || '';
            document.getElementById('service-desc').value = data.description || '';
            document.getElementById('service-slug').value = data.slug || '';
            document.getElementById('service-featured').checked = data.featured || false;
            
            document.getElementById('form-title').textContent = 'تعديل الخدمة';
            document.getElementById('submit-btn').textContent = 'حفظ التعديل';
            document.getElementById('cancel-edit-btn').style.display = 'inline-block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        document.getElementById('cancel-edit-btn')?.addEventListener('click', () => {
            document.getElementById('add-service-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('form-title').textContent = 'إضافة خدمة جديدة';
            document.getElementById('submit-btn').textContent = 'إضافة';
            document.getElementById('cancel-edit-btn').style.display = 'none';
        });

        // Sanitize Slug input automatically
        document.getElementById('service-slug').addEventListener('input', function() {
            this.value = this.value.toLowerCase().replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-').replace(/^-+/, '');
        });

        // Add service
        document.getElementById('add-service-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = sanitizePlainText(document.getElementById('service-title').value, 160);
            const desc = sanitizePlainText(document.getElementById('service-desc').value, 3000);
            let targetSlug = document.getElementById('service-slug').value.replace(/-+$/, '');
            const featured = document.getElementById('service-featured').checked;
            const submitBtn = e.target.querySelector('button');
            
            if (!title) return alert('يُرجى إدخال عنوان الخدمة.');
            if (!desc) return alert('يُرجى إدخال الوصف.');
            if (!targetSlug) return alert('يُرجى إدخال الرابط (Slug).');
            
            submitBtn.disabled = true;

            const editId = document.getElementById('edit-id').value;

            try {
                if (editId) {
                    const slugQuery = query(collection(db, "services"), where("slug", "==", targetSlug));
                    const slugSnapshot = await getDocs(slugQuery);
                    let isDuplicate = false;
                    slugSnapshot.forEach(d => { if (d.id !== editId) isDuplicate = true; });
                    if (isDuplicate) {
                        targetSlug = targetSlug + '-' + Date.now().toString().slice(-4);
                    }
                    await updateDoc(doc(db, "services", editId), {
                        title: title,
                        slug: targetSlug,
                        description: desc,
                        featured: featured
                    });
                    alert('تم تحديث الخدمة بنجاح');
                } else {
                    const slugQuery = query(collection(db, "services"), where("slug", "==", targetSlug));
                    const slugSnapshot = await getDocs(slugQuery);
                    if (!slugSnapshot.empty) {
                        targetSlug = targetSlug + '-' + Date.now().toString().slice(-4);
                    }
                    await addDoc(collection(db, "services"), {
                        title: title,
                        slug: targetSlug,
                        description: desc,
                        featured: featured
                    });
                    alert('تمت إضافة الخدمة بنجاح');
                }
                document.getElementById('cancel-edit-btn').click();
            } catch (err) {
                console.error(err);
                alert(translateFirebaseError(err));
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
