<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../assets/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>إدارة الخدمات - جذع</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <aside class="sidebar">
        <div style="text-align: center; margin-bottom: 10px;"><img src="../assets/logo.png" alt="جذع" style="width: 50px;"></div>
        <h2>إدارة جذع</h2>
        <a href="dashboard">لوحة التحكم</a>
        <a href="articles">المقالات</a>
        <a href="projects">المشاريع</a>
        <a href="services" class="active">الخدمات</a>
        <a href="reviews">آراء العملاء</a>
        <a href="messages">صندوق الوارد</a>
        <a href="donations">طرق الدعم</a>
        <a href="settings">الإعدادات</a>
        <button id="logout-btn">تسجيل الخروج</button>
    </aside>

    <main class="main-content">
        <h1>إدارة الخدمات</h1>
        
        <div class="card">
            <h3>إضافة خدمة جديدة</h3>
            <form id="add-service-form">
                <div class="form-group">
                    <label>عنوان الخدمة</label>
                    <input type="text" id="service-title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>الرابط الإنجليزي (Slug) - يجب أن يكون فريداً</label>
                    <input type="text" id="service-slug" class="form-control" placeholder="مثال: custom-development" dir="ltr" required>
                </div>
                <div class="form-group">
                    <label>الوصف</label>
                    <textarea id="service-desc" class="form-control" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="service-featured">
                        خدمة مميزة (تظهر في الرئيسية)
                    </label>
                </div>
                <button type="submit" class="btn">إضافة</button>
            </form>
        </div>

        <div class="card">
            <h3>قائمة الخدمات</h3>
            <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>العنوان</th>
                        <th>مميزة</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="services-list">
                    <!-- Loaded dynamically -->
                </tbody>
            </table>
            </div>
        </div>
    </main>

    <script src="../js/admin.js"></script>
    <script type="module">
        import { auth, onAuthStateChanged, signOut, db, collection, addDoc, updateDoc, onSnapshot, deleteDoc, doc, query, where, getDocs } from '../firebase/firebase.js';

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'login';
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // Real-time Load services
        onSnapshot(collection(db, "services"), (snapshot) => {
            const servicesList = document.getElementById('services-list');
            servicesList.innerHTML = '';
            if (snapshot.empty) {
                servicesList.innerHTML = '<tr><td colspan="3" style="text-align: center;">لا توجد خدمات.</td></tr>';
                return;
            }
            snapshot.forEach((document) => {
                const data = document.data();
                servicesList.innerHTML += `
                    <tr>
                        <td>${data.title}</td>
                        <td>${data.featured ? '✅ نعم' : '❌ لا'}</td>
                        <td><div class="table-actions"><button class="btn btn-danger btn-sm" onclick="deleteService('${document.id}')">حذف</button></div></td>
                    </tr>
                `;
            });
        });

        window.deleteService = async (id) => {
            if(confirm('هل أنت متأكد من الحذف؟')) {
                await deleteDoc(doc(db, "services", id));
            }
        };

        // Sanitize Slug input automatically
        document.getElementById('service-slug').addEventListener('input', function() {
            this.value = this.value.toLowerCase().replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-').replace(/^-+/, '');
        });

        // Add service
        document.getElementById('add-service-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('service-title').value;
            const desc = document.getElementById('service-desc').value;
            let targetSlug = document.getElementById('service-slug').value.replace(/-+$/, '');
            const featured = document.getElementById('service-featured').checked;
            const submitBtn = e.target.querySelector('button');
            
            if (!targetSlug) return alert('يُرجى إدخال الرابط (Slug).');
            
            submitBtn.disabled = true;

            try {
                // Check Slug uniqueness
                const slugQuery = query(collection(db, "services"), where("slug", "==", targetSlug));
                const slugSnapshot = await getDocs(slugQuery);
                if (!slugSnapshot.empty) {
                    targetSlug = targetSlug + '-' + Date.now().toString().slice(-4);
                }

                await addDoc(collection(db, "services"), {
                    title: title,
                    slug: targetSlug,
                    description: desc,
                    featured: featured
                });
                document.getElementById('add-service-form').reset();
            } catch (err) {
                console.error(err);
                alert('حدث خطأ أثناء الإضافة');
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
