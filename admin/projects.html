<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../assets/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>إدارة المشاريع - جذع</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../vendor/quill/quill.snow.css">
    <style>
        /* === CTA Modal Styles (shared) === */
        .cta-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.55); z-index: 9999;
            align-items: center; justify-content: center;
        }
        .cta-modal-overlay.active { display: flex; }
        .cta-modal {
            background: var(--admin-card-bg, #fff);
            border-radius: 16px; padding: 32px;
            width: min(480px, 95vw);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity:0; transform: scale(0.92) translateY(-10px); }
            to   { opacity:1; transform: scale(1) translateY(0); }
        }
        .cta-modal h4 { margin: 0 0 20px; font-size: 1.2rem; }
        .cta-modal .form-group { margin-bottom: 16px; }
        .cta-modal label { display:block; margin-bottom:6px; font-weight:bold; font-size:0.9rem; }
        .cta-modal input, .cta-modal textarea {
            width:100%; padding:10px 14px; border-radius:8px;
            border: 1.5px solid var(--admin-border,#ddd);
            font-family:inherit; font-size:0.95rem;
            background: var(--admin-input-bg,#f8f8f8);
            color: inherit;
        }
        .cta-modal textarea { resize: vertical; min-height: 110px; font-family: monospace; font-size:0.88rem; }
        .color-picker { display:flex; gap:10px; flex-wrap:wrap; margin-top:4px; }
        .color-swatch {
            width:36px; height:36px; border-radius:8px; cursor:pointer;
            border:3px solid transparent; transition:transform 0.15s, border-color 0.15s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.18);
        }
        .color-swatch:hover { transform: scale(1.12); }
        .color-swatch.selected { border-color: #fff; box-shadow: 0 0 0 3px #666; transform: scale(1.1); }
        .cta-modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:24px; }
        .ql-btn-insert::after  { content: '🔗 زر'; font-size:12px; }
        .ql-html-insert::after { content: '< > HTML'; font-size:12px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="text-align: center; margin-bottom: 10px;"><img src="../assets/logo.png" alt="جذع" style="width: 50px;"></div>
        <h2>إدارة جذع</h2>
        <a href="dashboard.html">لوحة التحكم</a>
        <a href="articles.html">المقالات</a>
        <a href="projects.html" class="active">المشاريع</a>
        <a href="services.html">الخدمات</a>
        <a href="reviews.html">آراء العملاء</a>
        <a href="messages.html">صندوق الوارد</a>
        <a href="settings.html">الإعدادات</a>
        <button id="logout-btn">تسجيل الخروج</button>
    </aside>

    <main class="main-content">
        <h1>إدارة المشاريع</h1>

        <div class="card">
            <h3 id="form-title">إضافة مشروع جديد</h3>
            <form id="project-form">
                <input type="hidden" id="project-id">

                <div class="form-grid-2">
                    <div class="form-group">
                        <label for="proj-title">عنوان المشروع</label>
                        <input type="text" id="proj-title" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="proj-tech">التقنيات (مفصولة بفاصلة)</label>
                        <input type="text" id="proj-tech" class="form-control" placeholder="HTML, CSS, JS...">
                    </div>
                </div>

                <div class="form-group">
                    <label for="proj-short">وصف قصير (يظهر في الكروت)</label>
                    <input type="text" id="proj-short" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="proj-full">الوصف الكامل</label>
                    <!-- Custom Quill Toolbar -->
                    <div id="proj-toolbar">
                        <span class="ql-formats">
                            <select class="ql-header"><option value="1"></option><option value="2"></option><option value="3"></option><option selected></option></select>
                        </span>
                        <span class="ql-formats">
                            <button class="ql-bold"></button>
                            <button class="ql-italic"></button>
                            <button class="ql-underline"></button>
                            <button class="ql-strike"></button>
                        </span>
                        <span class="ql-formats">
                            <button class="ql-list" value="ordered"></button>
                            <button class="ql-list" value="bullet"></button>
                        </span>
                        <span class="ql-formats">
                            <button class="ql-link"></button>
                            <button class="ql-image"></button>
                        </span>
                        <span class="ql-formats">
                            <button class="ql-clean"></button>
                        </span>
                        <span class="ql-formats">
                            <button type="button" id="proj-btn-cta" title="إدراج زر برابط" style="width:auto;padding:0 8px;font-size:11px;font-weight:bold;">&#128279; زر</button>
                            <button type="button" id="proj-btn-html" title="إدراج HTML مخصص" style="width:auto;padding:0 8px;font-size:11px;font-weight:bold;">&lt;/&gt; HTML</button>
                        </span>
                    </div>
                    <div id="proj-full-editor"></div>
                    <input type="hidden" id="proj-full">
                </div>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label for="proj-demo">رابط المعاينة <span class="hint">(اختياري)</span></label>
                        <input type="url" id="proj-demo" class="form-control" dir="ltr" placeholder="https:// — اتركه فارغاً إن لم يتوفر عرض حي">
                    </div>
                    <div class="form-group">
                        <label for="proj-github">رابط جيتهب / الكود المصدري <span class="hint">(اختياري)</span></label>
                        <input type="url" id="proj-github" class="form-control" dir="ltr" placeholder="https://github.com/... — اتركه فارغاً للمشاريع الخاصة">
                    </div>
                </div>

                <div class="form-group">
                    <label for="proj-image">الصورة الرئيسية</label>
                    <input type="file" id="proj-image" class="form-control" accept="image/*">
                    <div id="upload-progress"></div>
                </div>

                <div class="form-group">
                    <label><input type="checkbox" id="proj-featured"> مشروع مميز (يظهر في الرئيسية)</label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn" id="submit-btn">حفظ المشروع</button>
                    <button type="button" class="btn btn-danger" id="cancel-btn" style="display: none;">إلغاء التعديل</button>
                </div>
                <div id="form-msg"></div>
            </form>
        </div>

        <div class="card">
            <h3>قائمة المشاريع</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>صورة</th>
                            <th>المشروع</th>
                            <th>مميز</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="projects-list">
                        <tr><td colspan="4" style="text-align: center;">جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- ===== CTA Button Modal ===== -->
    <div class="cta-modal-overlay" id="cta-btn-modal">
        <div class="cta-modal" dir="rtl">
            <h4>⚡ إدراج زر برابط</h4>
            <div class="form-group">
                <label>نص الزر</label>
                <input type="text" id="cta-text" placeholder="مثال: اشترك الآن" maxlength="80">
            </div>
            <div class="form-group">
                <label>الرابط (URL)</label>
                <input type="url" id="cta-url" placeholder="https://" dir="ltr">
            </div>
            <div class="form-group">
                <label>لون الزر</label>
                <div class="color-picker" id="cta-color-picker">
                    <div class="color-swatch selected" data-color="primary"   style="background:#8C5A35;" title="أساسي (بني)"></div>
                    <div class="color-swatch"           data-color="secondary" style="background:#A3B18A;" title="ثانوي (أخضر مائل)"></div>
                    <div class="color-swatch"           data-color="gold"      style="background:#D4A373;" title="ذهبي"></div>
                    <div class="color-swatch"           data-color="dark"      style="background:#3E2723;" title="داكن"></div>
                    <div class="color-swatch"           data-color="green"     style="background:#4CAF50;" title="أخضر"></div>
                </div>
            </div>
            <div class="cta-modal-footer">
                <button type="button" class="btn btn-danger" id="cta-cancel-btn">إلغاء</button>
                <button type="button" class="btn" id="cta-insert-btn">إدراج الزر</button>
            </div>
        </div>
    </div>

    <!-- ===== Custom HTML Modal ===== -->
    <div class="cta-modal-overlay" id="html-block-modal">
        <div class="cta-modal" dir="rtl">
            <h4>&lt;/&gt; إدراج كود HTML مخصص</h4>
            <div class="form-group">
                <label>كود HTML</label>
                <textarea id="html-code-input" placeholder="&lt;iframe src=&quot;...&quot;&gt;&lt;/iframe&gt;
&lt;div class=&quot;widget&quot;&gt;...&lt;/div&gt;"></textarea>
            </div>
            <div class="cta-modal-footer">
                <button type="button" class="btn btn-danger" id="html-cancel-btn">إلغاء</button>
                <button type="button" class="btn" id="html-insert-btn">إدراج الكود</button>
            </div>
        </div>
    </div>

    <script src="../js/admin.js"></script>
    <script src="../vendor/quill/quill.min.js"></script>
    <script type="module">
        import { auth, onAuthStateChanged, signOut, db, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } from '../firebase/firebase.js';

        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = 'login.html'; });
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // ── Quill Editor for fullDescription (custom HTML toolbar) ──
        const quillProj = new Quill('#proj-full-editor', {
            theme: 'snow',
            placeholder: 'صف المشروع بالتفصيل...',
            modules: { toolbar: '#proj-toolbar' }
        });

        // ── Bind custom toolbar button clicks directly ──
        document.getElementById('proj-btn-cta').addEventListener('click', () => openCtaModal());
        document.getElementById('proj-btn-html').addEventListener('click', () => openHtmlModal());

        // ═══════════════════ CTA BUTTON MODAL ═══════════════════
        const ctaModal      = document.getElementById('cta-btn-modal');
        const ctaTextInput  = document.getElementById('cta-text');
        const ctaUrlInput   = document.getElementById('cta-url');
        const ctaPicker     = document.getElementById('cta-color-picker');
        let   selectedColor = 'primary';
        let   ctaRange      = null;

        ctaPicker.querySelectorAll('.color-swatch').forEach(sw => {
            sw.addEventListener('click', () => {
                ctaPicker.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
                sw.classList.add('selected');
                selectedColor = sw.dataset.color;
            });
        });

        function openCtaModal() {
            ctaRange = quillProj.getSelection();
            ctaTextInput.value = ''; ctaUrlInput.value = '';
            ctaModal.classList.add('active');
            setTimeout(() => ctaTextInput.focus(), 80);
        }
        document.getElementById('cta-cancel-btn').addEventListener('click', () => ctaModal.classList.remove('active'));
        ctaModal.addEventListener('click', (e) => { if (e.target === ctaModal) ctaModal.classList.remove('active'); });
        document.getElementById('cta-insert-btn').addEventListener('click', () => {
            const text = ctaTextInput.value.trim(), url = ctaUrlInput.value.trim();
            if (!text) { ctaTextInput.focus(); return; }
            if (!url)  { ctaUrlInput.focus();  return; }
            const btnHtml = `<a href="${url}" target="_blank" rel="noopener noreferrer" class="inline-btn inline-btn-${selectedColor}">${text}</a>`;
            const idx = (ctaRange && ctaRange.index != null) ? ctaRange.index : quillProj.getLength();
            quillProj.clipboard.dangerouslyPasteHTML(idx, btnHtml);
            quillProj.setSelection(idx + btnHtml.length);
            ctaModal.classList.remove('active');
        });

        // ═══════════════════ HTML BLOCK MODAL ═══════════════════
        const htmlModal     = document.getElementById('html-block-modal');
        const htmlCodeInput = document.getElementById('html-code-input');
        let   htmlRange     = null;

        function openHtmlModal() {
            htmlRange = quillProj.getSelection();
            htmlCodeInput.value = '';
            htmlModal.classList.add('active');
            setTimeout(() => htmlCodeInput.focus(), 80);
        }
        document.getElementById('html-cancel-btn').addEventListener('click', () => htmlModal.classList.remove('active'));
        htmlModal.addEventListener('click', (e) => { if (e.target === htmlModal) htmlModal.classList.remove('active'); });
        document.getElementById('html-insert-btn').addEventListener('click', () => {
            const code = htmlCodeInput.value.trim();
            if (!code) { htmlCodeInput.focus(); return; }
            const wrapped = `<div class="custom-html-block">${code}</div>`;
            const idx = (htmlRange && htmlRange.index != null) ? htmlRange.index : quillProj.getLength();
            quillProj.clipboard.dangerouslyPasteHTML(idx, wrapped);
            quillProj.setSelection(idx + 2);
            htmlModal.classList.remove('active');
        });

        const form = document.getElementById('project-form');
        const idInput = document.getElementById('project-id');
        const titleInput = document.getElementById('proj-title');
        const techInput = document.getElementById('proj-tech');
        const shortInput = document.getElementById('proj-short');
        const fullInput = document.getElementById('proj-full');
        const demoInput = document.getElementById('proj-demo');
        const githubInput = document.getElementById('proj-github');
        const featuredInput = document.getElementById('proj-featured');
        const imageInput = document.getElementById('proj-image');
        const progressDiv = document.getElementById('upload-progress');
        const msgDiv = document.getElementById('form-msg');
        const submitBtn = document.getElementById('submit-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const formTitle = document.getElementById('form-title');
        let currentEditingImageUrl = '';

        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        let width = img.width, height = img.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        onSnapshot(collection(db, 'projects'), (snapshot) => {
            const list = document.getElementById('projects-list');
            if (snapshot.empty) {
                list.innerHTML = '<tr><td colspan="4" style="text-align: center;">لا توجد مشاريع بعد.</td></tr>';
                return;
            }
            list.innerHTML = '';
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                const safeData = encodeURIComponent(JSON.stringify({
                    id, title: data.title, technologies: data.technologies,
                    shortDescription: data.shortDescription, fullDescription: data.fullDescription,
                    demoLink: data.demoLink, githubLink: data.githubLink, featured: data.featured
                }));
                list.innerHTML += `
                    <tr>
                        <td>${data.mainImage ? `<img src="${data.mainImage}" class="table-img" alt="">` : '—'}</td>
                        <td><strong>${data.title}</strong><br><span style="font-size:0.85rem;color:var(--admin-text-muted);">${data.technologies || ''}</span></td>
                        <td>${data.featured ? '✅' : '—'}</td>
                        <td><div class="table-actions">
                            <button class="btn btn-sm" onclick="editProject('${safeData}', '${id}')">تعديل</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteProject('${id}')">حذف</button>
                        </div></td>
                    </tr>`;
                if (!window.projectImages) window.projectImages = {};
                window.projectImages[id] = data.mainImage || '';
            });
        });

        window.editProject = (safeData, id) => {
            const data = JSON.parse(decodeURIComponent(safeData));
            idInput.value = data.id;
            titleInput.value = data.title;
            techInput.value = data.technologies || '';
            shortInput.value = data.shortDescription || '';
            // Load rich HTML into Quill editor
            quillProj.root.innerHTML = data.fullDescription || '';
            demoInput.value = data.demoLink || '';
            githubInput.value = data.githubLink || '';
            featuredInput.checked = data.featured || false;
            currentEditingImageUrl = window.projectImages[id] || '';
            formTitle.textContent = 'تعديل المشروع';
            submitBtn.textContent = 'تحديث المشروع';
            cancelBtn.style.display = 'inline-flex';
            document.querySelector('.card').scrollIntoView({ behavior: 'smooth' });
        };

        cancelBtn.addEventListener('click', () => {
            form.reset(); idInput.value = ''; currentEditingImageUrl = '';
            quillProj.root.innerHTML = ''; // reset Quill editor
            formTitle.textContent = 'إضافة مشروع جديد';
            submitBtn.textContent = 'حفظ المشروع';
            cancelBtn.style.display = 'none';
        });

        window.deleteProject = async (id) => {
            if (confirm('هل أنت متأكد من حذف هذا المشروع؟')) await deleteDoc(doc(db, 'projects', id));
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            msgDiv.textContent = 'جاري الحفظ...';
            msgDiv.className = '';
            try {
                let mainImage = currentEditingImageUrl;
                if (imageInput.files.length > 0) {
                    progressDiv.textContent = 'جاري معالجة الصورة...';
                    mainImage = await compressImage(imageInput.files[0]);
                    progressDiv.textContent = '';
                }
                const htmlContent = quillProj.root.innerHTML;
                if (htmlContent === '<p><br></p>' || !htmlContent.trim()) {
                    msgDiv.textContent = 'الوصف الكامل لا يمكن أن يكون فارغاً.';
                    msgDiv.className = 'msg-error';
                    submitBtn.disabled = false;
                    return;
                }
                const projectData = {
                    title: titleInput.value.trim(),
                    technologies: techInput.value.trim(),
                    shortDescription: shortInput.value.trim(),
                    fullDescription: htmlContent,
                    demoLink: demoInput.value.trim(),
                    githubLink: githubInput.value.trim(),
                    featured: featuredInput.checked,
                    mainImage
                };
                if (idInput.value) {
                    await updateDoc(doc(db, 'projects', idInput.value), projectData);
                    msgDiv.textContent = 'تم تحديث المشروع بنجاح!';
                } else {
                    await addDoc(collection(db, 'projects'), projectData);
                    msgDiv.textContent = 'تمت إضافة المشروع بنجاح!';
                }
                msgDiv.className = 'msg-success';
                cancelBtn.click();
                setTimeout(() => msgDiv.textContent = '', 3000);
            } catch (error) {
                msgDiv.textContent = 'حدث خطأ. تأكد أن حجم الصورة ليس ضخماً.';
                msgDiv.className = 'msg-error';
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
