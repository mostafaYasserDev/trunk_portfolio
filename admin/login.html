<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../assets/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <title>جذع - تسجيل الدخول للإدارة</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-login-page">

    <div class="admin-login-box">
        <img src="../assets/logo.png" alt="جذع" style="width: 60px; margin-bottom: 10px;">
        <h2>تسجيل الدخول</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <div class="input-with-icon">
                    <input type="password" id="password" class="form-control" required>
                    <button type="button" class="toggle-password" id="toggle-pwd" title="إظهار/إخفاء">👁</button>
                </div>
            </div>
            <button type="submit" class="btn" style="width: 100%;">دخول</button>
            <div id="error-message" class="error-msg"></div>
            <a id="forgot-password" class="forgot-link">نسيت كلمة المرور؟</a>
        </form>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
                regs.forEach(function (r) { r.unregister(); });
            });
        }
    </script>
    <script type="module">
        const errorMessage = document.getElementById('error-message');

        function showAuthError(error) {
            console.error(error);
            const code = error?.code || '';
            const messages = {
                'auth/unauthorized-domain': 'نطاق الموقع غير مسموح في Firebase. أضف نطاق Netlify أو GitHub Pages في Firebase Console → Authentication → Settings → Authorized domains.',
                'auth/invalid-credential': 'بيانات الدخول غير صحيحة.',
                'auth/wrong-password': 'بيانات الدخول غير صحيحة.',
                'auth/user-not-found': 'بيانات الدخول غير صحيحة.',
                'auth/too-many-requests': 'محاولات كثيرة. انتظر قليلاً ثم حاول مجدداً.',
                'auth/network-request-failed': 'مشكلة في الاتصال. تحقق من الإنترنت وحاول مجدداً.'
            };
            errorMessage.textContent = messages[code] || 'تعذر تسجيل الدخول. حاول مجدداً.';
            errorMessage.style.color = '';
        }

        try {
            const { auth, signInWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail } =
                await import('../firebase/firebase.js');

            onAuthStateChanged(auth, (user) => {
                if (user) window.location.href = 'dashboard';
            });

            const loginForm = document.getElementById('login-form');
            const emailInput = document.getElementById('email');
            const pwdInput = document.getElementById('password');
            const togglePwd = document.getElementById('toggle-pwd');

            togglePwd.addEventListener('click', () => {
                const isPass = pwdInput.type === 'password';
                pwdInput.type = isPass ? 'text' : 'password';
                togglePwd.textContent = isPass ? '🙈' : '👁';
            });

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMessage.textContent = '';
                try {
                    await signInWithEmailAndPassword(auth, emailInput.value, pwdInput.value);
                } catch (error) {
                    showAuthError(error);
                }
            });

            document.getElementById('forgot-password').addEventListener('click', async () => {
                const email = emailInput.value;
                if (!email) {
                    errorMessage.textContent = 'أدخل بريدك الإلكتروني أولاً.';
                    return;
                }
                try {
                    await sendPasswordResetEmail(auth, email);
                    errorMessage.textContent = 'تم إرسال رابط إعادة التعيين.';
                    errorMessage.style.color = 'var(--success)';
                } catch (error) {
                    showAuthError(error);
                }
            });
        } catch (error) {
            console.error(error);
            errorMessage.textContent = 'تعذر تحميل نظام الدخول. امسح كاش المتصفح (Ctrl+Shift+R) ثم أعد المحاولة.';
        }
    </script>
</body>
</html>
