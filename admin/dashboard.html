<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../assets/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>لوحة التحكم - جذع</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <aside class="sidebar">
        <div style="text-align: center; margin-bottom: 10px;"><img src="../assets/logo.png" alt="جذع" style="width: 50px;"></div>
        <h2>إدارة جذع</h2>
        <a href="dashboard" class="active">لوحة التحكم</a>
        <a href="articles">المقالات</a>
        <a href="projects">المشاريع</a>
        <a href="services">الخدمات</a>
        <a href="reviews">آراء العملاء</a>
        <a href="messages">صندوق الوارد</a>
        <a href="donations">طرق الدعم</a>
        <a href="settings">الإعدادات</a>
        <button id="logout-btn">تسجيل الخروج</button>
    </aside>

    <main class="main-content">
        <h1>مرحباً بك في لوحة التحكم</h1>

        <div class="card">
            <h3>إدارة المحتوى بسهولة</h3>
            <p>اختر القسم الذي تريد إدارته. جميع التغييرات تظهر مباشرة على الموقع.</p>
        </div>

        <div class="dashboard-grid">
            <a href="articles" class="dash-link"><span class="dash-link-icon">📜</span><span>المقالات</span></a>
            <a href="projects" class="dash-link"><span class="dash-link-icon">🌳</span><span>المشاريع</span></a>
            <a href="services" class="dash-link"><span class="dash-link-icon">🌿</span><span>الخدمات</span></a>
            <a href="donations" class="dash-link"><span class="dash-link-icon">💖</span><span>طرق الدعم</span></a>
            <a href="reviews" class="dash-link"><span class="dash-link-icon">💬</span><span>آراء العملاء</span></a>
            <a href="messages" class="dash-link"><span class="dash-link-icon">📬</span><span>صندوق الوارد</span></a>
            <a href="settings" class="dash-link"><span class="dash-link-icon">⚙️</span><span>الإعدادات</span></a>
        </div>
    </main>

    <script src="../js/admin.js"></script>
    <script type="module">
        import { auth, onAuthStateChanged, signOut } from '../firebase/firebase.js';
        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = 'login'; });
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
    </script>
</body>
</html>
