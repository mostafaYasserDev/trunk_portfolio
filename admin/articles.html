<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../assets/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>إدارة المقالات - جذع</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../vendor/quill/quill.snow.css">
    <style>
        /* === CTA Modal Styles === */
        .cta-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.55); z-index: 9999;
            align-items: center; justify-content: center;
        }
        .cta-modal-overlay.active { display: flex; }
        .cta-modal {
            background: var(--admin-card-bg, #fff);
            border-radius: 16px; padding: 32px;
            width: min(480px, 95vw);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity:0; transform: scale(0.92) translateY(-10px); }
            to   { opacity:1; transform: scale(1) translateY(0); }
        }
        .cta-modal h4 { margin: 0 0 20px; font-size: 1.2rem; }
        .cta-modal .form-group { margin-bottom: 16px; }
        .cta-modal label { display:block; margin-bottom:6px; font-weight:bold; font-size:0.9rem; }
        .cta-modal input, .cta-modal textarea {
            width:100%; padding:10px 14px; border-radius:8px;
            border: 1.5px solid var(--admin-border,#ddd);
            font-family:inherit; font-size:0.95rem;
            background: var(--admin-input-bg,#f8f8f8);
            color: inherit;
        }
        .cta-modal textarea { resize: vertical; min-height: 110px; font-family: monospace; font-size:0.88rem; }
        .color-picker { display:flex; gap:10px; flex-wrap:wrap; margin-top:4px; }
        .color-swatch {
            width:36px; height:36px; border-radius:8px; cursor:pointer;
            border:3px solid transparent; transition:transform 0.15s, border-color 0.15s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.18);
        }
        .color-swatch:hover { transform: scale(1.12); }
        .color-swatch.selected { border-color: #fff; box-shadow: 0 0 0 3px #666; transform: scale(1.1); }
        .cta-modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:24px; }
        /* Quill custom buttons */
        .ql-btn-insert::after  { content: '🔗 زر'; font-size:12px; }
        .ql-html-insert::after { content: '< > HTML'; font-size:12px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="text-align: center; margin-bottom: 10px;"><img src="../assets/logo.png" alt="جذع" style="width: 50px;"></div>
        <h2>إدارة جذع</h2>
        <a href="dashboard.html">لوحة التحكم</a>
        <a href="articles.html" class="active">المقالات</a>
        <a href="projects.html">المشاريع</a>
        <a href="services.html">الخدمات</a>
        <a href="reviews.html">آراء العملاء</a>
        <a href="messages.html">صندوق الوارد</a>
        <a href="settings.html">الإعدادات</a>
        <button id="logout-btn">تسجيل الخروج</button>
    </aside>

    <main class="main-content">
        <h1>إدارة المقالات</h1>
        
        <div class="card">
            <h3 id="form-title">إضافة مقال جديد</h3>
            <form id="article-form">
                <input type="hidden" id="article-id">
                <div class="form-group">
                    <label>عنوان المقال</label>
                    <input type="text" id="art-title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>وصف قصير</label>
                    <input type="text" id="art-desc" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>المحتوى</label>
                    <!-- Custom Quill Toolbar -->
                    <div id="art-toolbar">
                        <span class="ql-formats">
                            <select class="ql-header"><option value="1"></option><option value="2"></option><option value="3"></option><option selected></option></select>
                        </span>
                        <span class="ql-formats">
                            <button class="ql-bold"></button>
                            <button class="ql-italic"></button>
                            <button class="ql-underline"></button>
                            <button class="ql-strike"></button>
                        </span>
                        <span class="ql-formats">
                            <button class="ql-list" value="ordered"></button>
                            <button class="ql-list" value="bullet"></button>
                        </span>
                        <span class="ql-formats">
                            <button class="ql-link"></button>
                            <button class="ql-image"></button>
                            <button class="ql-video"></button>
                        </span>
                        <span class="ql-formats">
                            <button class="ql-clean"></button>
                        </span>
                        <span class="ql-formats">
                            <button type="button" id="art-btn-cta" title="إدراج زر برابط" style="width:auto;padding:0 8px;font-size:11px;font-weight:bold;">&#128279; زر</button>
                            <button type="button" id="art-btn-html" title="إدراج HTML مخصص" style="width:auto;padding:0 8px;font-size:11px;font-weight:bold;">&lt;/&gt; HTML</button>
                        </span>
                    </div>
                    <div id="editor-container"></div>
                </div>
                <div class="form-group">
                    <label>صورة الغلاف (اختياري)</label>
                    <input type="file" id="art-image" class="form-control" accept="image/*">
                    <div id="upload-progress" style="font-size: 0.9rem; color: var(--admin-primary); margin-top: 5px;"></div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn" id="submit-btn">حفظ المقال</button>
                    <button type="button" class="btn btn-danger" id="cancel-btn" style="display: none;">إلغاء التعديل</button>
                </div>
                <div id="form-msg"></div>
            </form>
        </div>

        <div class="card">
            <h3>قائمة المقالات</h3>
            <div class="table-wrap">
                <table>
                <thead>
                    <tr>
                        <th>صورة</th>
                        <th>العنوان</th>
                        <th>التاريخ</th>
                        <th style="width: 150px;">إجراءات</th>
                    </tr>
                </thead>
                <tbody id="articles-list">
                    <tr><td colspan="4" style="text-align: center;">جاري التحميل...</td></tr>
                </tbody>
            </table>
            </div>
        </div>
    </main>

    <!-- ===== CTA Button Modal ===== -->
    <div class="cta-modal-overlay" id="cta-btn-modal">
        <div class="cta-modal" dir="rtl">
            <h4>⚡ إدراج زر برابط</h4>
            <div class="form-group">
                <label>نص الزر</label>
                <input type="text" id="cta-text" placeholder="مثال: اشترك الآن" maxlength="80">
            </div>
            <div class="form-group">
                <label>الرابط (URL)</label>
                <input type="url" id="cta-url" placeholder="https://" dir="ltr">
            </div>
            <div class="form-group">
                <label>لون الزر</label>
                <div class="color-picker" id="cta-color-picker">
                    <div class="color-swatch selected" data-color="primary"   style="background:#8C5A35;" title="أساسي (بني)"></div>
                    <div class="color-swatch"           data-color="secondary" style="background:#A3B18A;" title="ثانوي (أخضر مائل)"></div>
                    <div class="color-swatch"           data-color="gold"      style="background:#D4A373;" title="ذهبي"></div>
                    <div class="color-swatch"           data-color="dark"      style="background:#3E2723;" title="داكن"></div>
                    <div class="color-swatch"           data-color="green"     style="background:#4CAF50;" title="أخضر"></div>
                </div>
            </div>
            <div class="cta-modal-footer">
                <button type="button" class="btn btn-danger" id="cta-cancel-btn">إلغاء</button>
                <button type="button" class="btn" id="cta-insert-btn">إدراج الزر</button>
            </div>
        </div>
    </div>

    <!-- ===== Custom HTML Modal ===== -->
    <div class="cta-modal-overlay" id="html-block-modal">
        <div class="cta-modal" dir="rtl">
            <h4>&lt;/&gt; إدراج كود HTML مخصص</h4>
            <div class="form-group">
                <label>كود HTML</label>
                <textarea id="html-code-input" placeholder="&lt;iframe src=&quot;...&quot;&gt;&lt;/iframe&gt;
&lt;div class=&quot;widget&quot;&gt;...&lt;/div&gt;
&lt;script&gt;...&lt;/script&gt;"></textarea>
            </div>
            <div class="cta-modal-footer">
                <button type="button" class="btn btn-danger" id="html-cancel-btn">إلغاء</button>
                <button type="button" class="btn" id="html-insert-btn">إدراج الكود</button>
            </div>
        </div>
    </div>

    <script src="../js/admin.js"></script>
    <script src="../vendor/quill/quill.min.js"></script>

    <script type="module">
        import { auth, onAuthStateChanged, signOut, db, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } from '../firebase/firebase.js';

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'login.html';
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // Initialize Quill Editor
        if (typeof Quill === 'undefined') {
            document.getElementById('form-msg').textContent = 'تعذر تحميل محرر النصوص. حدّث الصفحة أو امسح الكاش.';
            document.getElementById('form-msg').className = 'msg error';
        }

        // ── Quill init with custom HTML toolbar ──
        var quill = typeof Quill !== 'undefined' ? new Quill('#editor-container', {
            theme: 'snow',
            placeholder: 'اكتب مقالك الرائع هنا...',
            modules: { toolbar: '#art-toolbar' }
        }) : null;

        // ── Bind custom toolbar button clicks directly ──
        document.getElementById('art-btn-cta').addEventListener('click', () => openCtaModal());
        document.getElementById('art-btn-html').addEventListener('click', () => openHtmlModal());

        // ═══════════════════ CTA BUTTON MODAL ═══════════════════
        const ctaModal      = document.getElementById('cta-btn-modal');
        const ctaTextInput  = document.getElementById('cta-text');
        const ctaUrlInput   = document.getElementById('cta-url');
        const ctaPicker     = document.getElementById('cta-color-picker');
        let   selectedColor = 'primary';
        let   ctaRange      = null; // cursor position when modal opened

        ctaPicker.querySelectorAll('.color-swatch').forEach(sw => {
            sw.addEventListener('click', () => {
                ctaPicker.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
                sw.classList.add('selected');
                selectedColor = sw.dataset.color;
            });
        });

        function openCtaModal() {
            if (!quill) return;
            ctaRange = quill.getSelection();
            ctaTextInput.value = '';
            ctaUrlInput.value  = '';
            ctaModal.classList.add('active');
            setTimeout(() => ctaTextInput.focus(), 80);
        }

        document.getElementById('cta-cancel-btn').addEventListener('click', () => {
            ctaModal.classList.remove('active');
        });

        ctaModal.addEventListener('click', (e) => {
            if (e.target === ctaModal) ctaModal.classList.remove('active');
        });

        document.getElementById('cta-insert-btn').addEventListener('click', () => {
            const text  = ctaTextInput.value.trim();
            const url   = ctaUrlInput.value.trim();
            if (!text) { ctaTextInput.focus(); return; }
            if (!url)  { ctaUrlInput.focus();  return; }

            // Build the button HTML
            const btnHtml = `<a href="${url}" target="_blank" rel="noopener noreferrer" class="inline-btn inline-btn-${selectedColor}">${text}</a>`;

            // Insert at cursor (or at end)
            const idx = (ctaRange && ctaRange.index != null) ? ctaRange.index : quill.getLength();
            quill.clipboard.dangerouslyPasteHTML(idx, btnHtml);
            quill.setSelection(idx + btnHtml.length);

            ctaModal.classList.remove('active');
        });

        // ═══════════════════ HTML BLOCK MODAL ═══════════════════
        const htmlModal     = document.getElementById('html-block-modal');
        const htmlCodeInput = document.getElementById('html-code-input');
        let   htmlRange     = null;

        function openHtmlModal() {
            if (!quill) return;
            htmlRange = quill.getSelection();
            htmlCodeInput.value = '';
            htmlModal.classList.add('active');
            setTimeout(() => htmlCodeInput.focus(), 80);
        }

        document.getElementById('html-cancel-btn').addEventListener('click', () => {
            htmlModal.classList.remove('active');
        });

        htmlModal.addEventListener('click', (e) => {
            if (e.target === htmlModal) htmlModal.classList.remove('active');
        });

        document.getElementById('html-insert-btn').addEventListener('click', () => {
            const code = htmlCodeInput.value.trim();
            if (!code) { htmlCodeInput.focus(); return; }

            const wrapped = `<div class="custom-html-block">${code}</div>`;
            const idx = (htmlRange && htmlRange.index != null) ? htmlRange.index : quill.getLength();
            quill.clipboard.dangerouslyPasteHTML(idx, wrapped);
            quill.setSelection(idx + 2); // move cursor past block

            htmlModal.classList.remove('active');
        });

        // Form elements
        const form = document.getElementById('article-form');
        const idInput = document.getElementById('article-id');
        const titleInput = document.getElementById('art-title');
        const descInput = document.getElementById('art-desc');
        const imageInput = document.getElementById('art-image');
        const progressDiv = document.getElementById('upload-progress');
        const msgDiv = document.getElementById('form-msg');
        const submitBtn = document.getElementById('submit-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const formTitle = document.getElementById('form-title');

        let currentEditingImageUrl = '';

        // Image Compression to Base64 (Free Alternative to Firebase Storage)
        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; // Limit width to save space
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Convert to compressed JPEG (quality 0.7)
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.onerror = error => reject(error);
                };
                reader.onerror = error => reject(error);
            });
        }

        // Real-time articles listener
        onSnapshot(collection(db, "articles"), (snapshot) => {
            const list = document.getElementById('articles-list');
            if(snapshot.empty) {
                list.innerHTML = '<tr><td colspan="4" style="text-align: center;">لا توجد مقالات بعد.</td></tr>';
                return;
            }
            list.innerHTML = '';
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                // Store full content in window variable to avoid passing huge HTML strings via inline handlers
                if(!window.articleDataMap) window.articleDataMap = {};
                window.articleDataMap[id] = {
                    title: data.title,
                    shortDescription: data.shortDescription,
                    content: data.content,
                    coverImage: data.coverImage || ''
                };
                
                list.innerHTML += `
                    <tr>
                        <td>${data.coverImage ? `<img src="${data.coverImage}" class="table-img" alt="">` : '—'}</td>
                        <td><strong>${data.title}</strong></td>
                        <td>${data.publishDate}</td>
                        <td><div class="table-actions">
                            <button class="btn btn-sm" onclick="editArticle('${id}')">تعديل</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteArticle('${id}')">حذف</button>
                        </div></td>
                    </tr>
                `;
            });
        });

        window.editArticle = (id) => {
            const data = window.articleDataMap[id];
            if (!data) return;
            
            idInput.value = id;
            titleInput.value = data.title;
            descInput.value = data.shortDescription;
            if (!quill) return;
            quill.root.innerHTML = data.content; // Load HTML into Quill
            currentEditingImageUrl = data.coverImage;
            
            formTitle.textContent = 'تعديل المقال';
            submitBtn.textContent = 'تحديث المقال';
            cancelBtn.style.display = 'inline-block';
            window.scrollTo(0, 0);
        };

        cancelBtn.addEventListener('click', () => {
            form.reset();
            idInput.value = '';
            currentEditingImageUrl = '';
            if (quill) quill.root.innerHTML = '';
            formTitle.textContent = 'إضافة مقال جديد';
            submitBtn.textContent = 'حفظ المقال';
            cancelBtn.style.display = 'none';
        });

        window.deleteArticle = async (id) => {
            if(confirm('هل أنت متأكد من حذف هذا المقال نهائياً؟')) {
                await deleteDoc(doc(db, "articles", id));
            }
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get HTML content from Quill
            if (!quill) {
                msgDiv.textContent = 'محرر النصوص غير متاح.';
                msgDiv.className = 'msg error';
                return;
            }
            const htmlContent = quill.root.innerHTML;
            if (htmlContent === '<p><br></p>') {
                msgDiv.textContent = 'المحتوى لا يمكن أن يكون فارغاً.';
                msgDiv.style.color = 'red';
                return;
            }

            submitBtn.disabled = true;
            msgDiv.textContent = 'جاري الحفظ...';
            msgDiv.style.color = 'var(--admin-primary)';

            try {
                let coverImage = currentEditingImageUrl;
                
                // Handle Image Upload using Base64 Compression
                if (imageInput.files.length > 0) {
                    const file = imageInput.files[0];
                    progressDiv.textContent = 'جاري ضغط ومعالجة الصورة...';
                    coverImage = await compressImage(file);
                    progressDiv.textContent = '';
                }

                const articleData = {
                    title: titleInput.value,
                    shortDescription: descInput.value,
                    content: htmlContent, // Save as rich HTML
                    coverImage: coverImage,
                    publishDate: idInput.value ? undefined : new Date().toISOString().split('T')[0] // Only set date on creation
                };
                
                // Clean up undefined (Firebase doesn't like undefined)
                if(!articleData.publishDate) delete articleData.publishDate;

                if (idInput.value) {
                    // Update existing
                    await updateDoc(doc(db, "articles", idInput.value), articleData);
                    msgDiv.textContent = 'تم تحديث المقال بنجاح!';
                } else {
                    // Create new
                    await addDoc(collection(db, "articles"), articleData);
                    msgDiv.textContent = 'تمت إضافة المقال بنجاح!';
                }
                
                msgDiv.style.color = 'green';
                cancelBtn.click(); // Reset form
                setTimeout(() => msgDiv.textContent = '', 3000);

            } catch (error) {
                console.error(error);
                msgDiv.textContent = 'حدث خطأ. تأكد أن حجم الصورة ليس ضخماً جداً.';
                msgDiv.style.color = 'red';
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
