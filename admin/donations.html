<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../assets/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <title>إدارة طرق الدعم - جذع</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar">
        <div style="text-align: center; margin-bottom: 10px;"><img src="../assets/logo.png" alt="جذع" style="width: 50px;"></div>
        <h2>إدارة جذع</h2>
        <a href="dashboard">لوحة التحكم</a>
        <a href="articles">المقالات</a>
        <a href="projects">المشاريع</a>
        <a href="services">الخدمات</a>
        <a href="reviews">آراء العملاء</a>
        <a href="messages">صندوق الوارد</a>
        <a href="donations" class="active">طرق الدعم</a>
        <a href="settings">الإعدادات</a>
        <button id="logout-btn">تسجيل الخروج</button>
    </aside>

    <main class="main-content">
        <h1>إدارة طرق الدعم</h1>
        
        <div class="card">
            <h3 id="form-title">إضافة طريقة دعم جديدة</h3>
            <form id="add-donation-form">
                <input type="hidden" id="don-id">
                <div class="form-grid-2">
                    <div class="form-group">
                        <label>عنوان الطريقة (مثال: Patreon)</label>
                        <input type="text" id="don-title" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>الأيقونة (كود FontAwesome أو رفع SVG/صورة)</label>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <input type="text" id="don-icon" class="form-control" placeholder="fa-brands fa-paypal" dir="ltr" style="flex:1;">
                            <span style="color:var(--admin-text-muted);font-size:0.9rem;">أو</span>
                            <input type="file" id="don-image" accept="image/*,.svg" style="max-width:200px; font-size:0.8rem;">
                            <div id="don-preview" style="width:40px; height:40px; border:1px solid var(--admin-border); border-radius:5px; display:flex; align-items:center; justify-content:center; overflow:hidden; background:var(--admin-card-bg);">
                                <i class="fas fa-image" style="color:var(--admin-text-muted);"></i>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>الرابط (URL)</label>
                    <input type="url" id="don-url" class="form-control" placeholder="https://" dir="ltr" required>
                </div>
                
                <div class="form-group">
                    <label>وصف قصير</label>
                    <textarea id="don-desc" class="form-control" rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="don-active" checked>
                        تفعيل هذه الطريقة (تظهر للزوار)
                    </label>
                </div>
                <div class="form-actions" style="margin-top:20px; display:flex; gap:10px;">
                    <button type="submit" class="btn" id="submit-btn">حفظ طريقة الدعم</button>
                    <button type="button" class="btn btn-danger" id="cancel-btn" style="display: none;">إلغاء التعديل</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h3>طرق الدعم المتاحة</h3>
            <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>الأيقونة</th>
                        <th>العنوان</th>
                        <th>الحالة</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="donations-list">
                    <tr><td colspan="4" style="text-align: center;">جاري التحميل...</td></tr>
                </tbody>
            </table>
            </div>
        </div>
    </main>

    <script src="../js/admin.js"></script>
    <script type="module">
        import { auth, onAuthStateChanged, signOut, db, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } from '../firebase/firebase.js';
        import { translateFirebaseError } from '../js/admin-ui.js';
        import { escapeHtml, sanitizeHttpUrl, sanitizeIconClass, sanitizeMediaUrl, sanitizePlainText } from '../js/security.js?v=14';

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'login';
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // Real-time Load donations
        onSnapshot(collection(db, "donations"), (snapshot) => {
            const list = document.getElementById('donations-list');
            list.innerHTML = '';
            if (snapshot.empty) {
                list.innerHTML = '<tr><td colspan="4" style="text-align: center;">لا توجد طرق دعم حالياً.</td></tr>';
                return;
            }
            list.innerHTML = '';
            // Store data for editing
            if (!window.donationsData) window.donationsData = {};

            snapshot.forEach((documentSnap) => {
                const data = documentSnap.data();
                const id = documentSnap.id;
                const isActive = data.active !== false;
                window.donationsData[id] = data;

                const safeIconImage = sanitizeMediaUrl(data.icon, { allowImage: true, allowPdf: false });
                const safeIconClass = sanitizeIconClass(data.icon) || 'fas fa-link';
                const safeUrl = sanitizeHttpUrl(data.url);
                const iconHtml = safeIconImage
                    ? `<span role="img" aria-label="أيقونة ${escapeHtml(data.title)}" style="display:block;width:30px;height:30px;background:var(--admin-primary);--donation-icon-image: url(&quot;${escapeHtml(safeIconImage)}&quot;);-webkit-mask-image:var(--donation-icon-image);mask-image:var(--donation-icon-image);-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center;"></span>`
                    : `<i class="${escapeHtml(safeIconClass)}" aria-hidden="true"></i>`;

                list.innerHTML += `
                    <tr>
                        <td style="font-size: 1.5rem; text-align:center;">${iconHtml}</td>
                        <td>${escapeHtml(data.title)}</td>
                        <td>
                            <label class="switch" style="cursor:pointer;">
                                <input type="checkbox" aria-label="تفعيل ${escapeHtml(data.title)}" onchange="toggleActive('${id}', this.checked)" ${isActive ? 'checked' : ''}>
                                ${isActive ? 'مفعل' : 'معطل'}
                            </label>
                        </td>
                        <td>
                            <div class="table-actions">
                                ${safeUrl ? `<a href="${escapeHtml(safeUrl)}" target="_blank" rel="noopener noreferrer" class="btn btn-sm">تجربة الرابط</a>` : '<span class="hint">رابط غير صالح</span>'}
                                <button class="btn btn-sm" onclick="editDonation('${id}')">تعديل</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteDonation('${id}')">حذف</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        });

        window.deleteDonation = async (id) => {
            if(confirm('هل أنت متأكد من الحذف؟')) {
                await deleteDoc(doc(db, "donations", id));
            }
        };

        window.toggleActive = async (id, isActive) => {
            await updateDoc(doc(db, "donations", id), { active: isActive });
        };

        const form = document.getElementById('add-donation-form');
        const idInput = document.getElementById('don-id');
        const titleInput = document.getElementById('don-title');
        const iconInput = document.getElementById('don-icon');
        const imageInput = document.getElementById('don-image');
        const previewDiv = document.getElementById('don-preview');
        const urlInput = document.getElementById('don-url');
        const descInput = document.getElementById('don-desc');
        const activeInput = document.getElementById('don-active');
        const submitBtn = document.getElementById('submit-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        let currentImageBase64 = '';
        const MAX_ENCODED_ICON_SIZE = 180 * 1024;

        function compressIconFile(file) {
            return new Promise((resolve, reject) => {
                if (!file.type.startsWith('image/')) {
                    reject(new Error('الملف المختار ليس صورة.'));
                    return;
                }
                const reader = new FileReader();
                reader.onload = (event) => {
                    const image = new Image();
                    image.onload = () => {
                        const maxSide = 160;
                        const scale = Math.min(1, maxSide / Math.max(image.width, image.height));
                        const canvas = document.createElement('canvas');
                        canvas.width = Math.max(1, Math.round(image.width * scale));
                        canvas.height = Math.max(1, Math.round(image.height * scale));
                        canvas.getContext('2d').drawImage(image, 0, 0, canvas.width, canvas.height);
                        const encoded = canvas.toDataURL('image/webp', 0.8);
                        if (encoded.length > MAX_ENCODED_ICON_SIZE) {
                            reject(new Error('الأيقونة كبيرة بعد الضغط. استخدم صورة أبسط.'));
                            return;
                        }
                        resolve(encoded);
                    };
                    image.onerror = () => reject(new Error('تعذر قراءة الصورة.'));
                    image.src = event.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function renderIconPreview(value) {
            previewDiv.innerHTML = '';
            const image = sanitizeMediaUrl(value, { allowImage: true, allowPdf: false });
            if (image) {
                const icon = document.createElement('span');
                icon.className = 'donation-icon-image';
                icon.setAttribute('role', 'img');
                icon.setAttribute('aria-label', 'معاينة أيقونة وسيلة الدعم');
                icon.style.cssText = 'display:block;width:100%;height:100%;background:var(--admin-primary);-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center;';
                const cssImage = image.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
                icon.style.setProperty('--donation-icon-image', `url("${cssImage}")`);
                icon.style.webkitMaskImage = 'var(--donation-icon-image)';
                icon.style.maskImage = 'var(--donation-icon-image)';
                previewDiv.appendChild(icon);
                return;
            }
            const icon = document.createElement('i');
            icon.className = sanitizeIconClass(value) || 'fas fa-image';
            if (!sanitizeIconClass(value)) icon.style.color = '#ccc';
            previewDiv.appendChild(icon);
        }

        // Live preview for icon class
        iconInput.addEventListener('input', () => {
            renderIconPreview(iconInput.value);
        });

        // Live preview and compression for image/SVG upload
        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            try {
                currentImageBase64 = await compressIconFile(file);
                iconInput.value = ''; // clear text if image uploaded
                renderIconPreview(currentImageBase64);
            } catch (error) {
                currentImageBase64 = '';
                imageInput.value = '';
                alert(error.message || 'تعذر معالجة الصورة.');
            }
        });

        window.editDonation = (id) => {
            const data = window.donationsData[id];
            if (!data) return;
            idInput.value = id;
            titleInput.value = data.title;
            urlInput.value = data.url;
            descInput.value = data.description || '';
            activeInput.checked = data.active !== false;
            
            if (data.icon && data.icon.startsWith('data:image')) {
                currentImageBase64 = data.icon;
                iconInput.value = '';
                renderIconPreview(currentImageBase64);
            } else {
                currentImageBase64 = '';
                iconInput.value = data.icon || '';
                renderIconPreview(data.icon);
            }

            submitBtn.textContent = 'تحديث الطريقة';
            document.getElementById('form-title').textContent = 'تعديل طريقة الدعم';
            cancelBtn.style.display = 'inline-flex';
            document.querySelector('.card').scrollIntoView({ behavior: 'smooth' });
        };

        cancelBtn.addEventListener('click', () => {
            idInput.value = '';
            currentImageBase64 = '';
            previewDiv.innerHTML = `<i class="fas fa-image" style="color:#ccc;"></i>`;
            submitBtn.textContent = 'حفظ طريقة الدعم';
            document.getElementById('form-title').textContent = 'إضافة طريقة دعم جديدة';
            cancelBtn.style.display = 'none';
            form.reset();
        });

        // Add / Update donation
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;

            const title = sanitizePlainText(titleInput.value, 160);
            const description = sanitizePlainText(descInput.value, 1000);
            const safeUrl = sanitizeHttpUrl(urlInput.value);
            const finalIcon = currentImageBase64
                ? sanitizeMediaUrl(currentImageBase64, { allowImage: true, allowPdf: false })
                : sanitizeIconClass(iconInput.value);
            if (!title || !safeUrl) {
                alert('يُرجى إدخال عنوان ورابط https صالحين.');
                submitBtn.disabled = false;
                return;
            }
            if (!finalIcon) {
                alert('يُرجى إدخال كود الأيقونة أو رفع صورة.');
                submitBtn.disabled = false;
                return;
            }

            try {
                const docData = {
                    title,
                    icon: finalIcon,
                    url: safeUrl,
                    description,
                    active: activeInput.checked
                };

                if (idInput.value) {
                    await updateDoc(doc(db, "donations", idInput.value), docData);
                } else {
                    await addDoc(collection(db, "donations"), docData);
                }
                cancelBtn.click(); // Reset form
            } catch (err) {
                console.error(err);
                alert(translateFirebaseError(err));
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
