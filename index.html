<body>

    <div class="container">
        <header>
            <a href="#home" class="logo logo-link">
                <img src="assets/logo.png" alt="جذع" fetchpriority="high" width="48" height="48">
                <div class="logo-text">جذع <span>.</span></div>
            </a>
            <div class="header-right">
                <nav id="main-nav" class="main-nav">
                    <a href="#home">الرئيسية</a>
                    <a href="#services">الخدمات</a>
                    <a href="#projects">المشاريع</a>
                    <a href="#articles">المقالات</a>
                    <a href="#contact">تواصل معي</a>
                </nav>
                <div class="header-actions">
                    <button id="theme-toggle" class="btn" aria-label="تبديل الوضع الليلي">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button id="menu-toggle" class="menu-toggle" aria-label="فتح القائمة" aria-expanded="false">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </header>

        <template id="home-shell">
            <div class="view active" id="home-view">
                <section id="home" class="hero glass-panel">
                    <div class="hero-content">
                        <span class="trunk-badge">مرحباً بك في جذع</span>
                        <h1>أروي حكايات برمجية</h1>
                        <p>تتأصل الأفكار وتنمو كالأشجار. أقدم حلولاً برمجية بروح فنية ولمسة إبداعية تجمع بين أصالة
                            الجذور وجمال الأغصان.</p>
                        <div class="hero-btns">
                            <a href="#projects" class="btn">استكشف أعمالي</a>
                            <a id="cv-download-btn" href="#" class="btn btn-outline" style="display:none;"
                                download="سيرة-ذاتية.pdf">
                                <i class="fas fa-file-download"></i> تحميل السيرة الذاتية
                            </a>
                        </div>
                    </div>
                </section>

                <section class="about-section" data-aos="fade-up">
                    <h2 class="section-title">من أنا؟ (نبذة عني)</h2>
                    <div class="glass-panel about-grid" style="padding: 40px; border-radius: 20px;">
                        <div id="about-image-container">
                            <div class="about-image-placeholder">🌳</div>
                        </div>
                        <div class="about-text" id="about-text-content">
                            <p>مرحباً! أنا مطور واجهات ومصمم تجربة مستخدم شغوف ببناء مواقع وتطبيقات ويب سريعة ومميزة.
                                أؤمن بأن البرمجة كالشجرة؛ تبدأ ببذرة (الفكرة)، وتمتد جذورها (الكود الأساسي)، ثم تتفرع
                                أغصانها (الواجهة) لتثمر في النهاية تجربة مستخدم رائعة.</p>
                            <p>أسعى دائماً لتقديم حلول تقنية تجمع بين الأداء العالي والتصميم الجذاب، مع التركيز على
                                كتابة كود نظيف وقابل للتطوير.</p>
                        </div>
                    </div>
                </section>

                <section id="services" data-aos="fade-up">
                    <div class="section-header">
                        <h2 class="section-title">أبرز الخدمات</h2>
                        <a href="#all-services" class="view-all-link">عرض الكل <i class="fas fa-arrow-left"></i></a>
                    </div>
                    <div class="grid" id="services-grid">
                        <div class="skeleton-card">
                            <div class="skeleton-img"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line short"></div>
                        </div>
                        <div class="skeleton-card">
                            <div class="skeleton-img"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line short"></div>
                        </div>
                        <div class="skeleton-card">
                            <div class="skeleton-img"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line short"></div>
                        </div>
                    </div>
                </section>

                <section id="projects" data-aos="fade-up">
                    <div class="section-header">
                        <h2 class="section-title">أبرز المشاريع</h2>
                        <a href="#all-projects" class="view-all-link">عرض الكل <i class="fas fa-arrow-left"></i></a>
                    </div>
                    <div class="grid" id="projects-grid">
                        <div class="skeleton-card">
                            <div class="skeleton-img"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line short"></div>
                        </div>
                        <div class="skeleton-card">
                            <div class="skeleton-img"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line short"></div>
                        </div>
                        <div class="skeleton-card">
                            <div class="skeleton-img"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line short"></div>
                        </div>
                    </div>
                </section>

                <section id="articles" data-aos="fade-up">
                    <div class="section-header">
                        <h2 class="section-title">أحدث المقالات</h2>
                        <a href="#all-articles" class="view-all-link">عرض الكل <i class="fas fa-arrow-left"></i></a>
                    </div>
                    <div class="grid" id="articles-grid">
                        <div class="skeleton-card">
                            <div class="skeleton-img"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line short"></div>
                        </div>
                        <div class="skeleton-card">
                            <div class="skeleton-img"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line short"></div>
                        </div>
                        <div class="skeleton-card">
                            <div class="skeleton-img"></div>
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line short"></div>
                        </div>
                    </div>
                </section>

                <section class="reviews-section" data-aos="fade-up">
                    <h2 class="section-title" style="color:var(--text-main);">ماذا قالوا عن جذع؟</h2>
                    <p class="reviews-scroll-hint"><i class="fas fa-hand-pointer"></i> اسحب للمزيد من الآراء</p>
                    <div class="reviews-grid" id="reviews-grid">
                        <div class="skeleton-card review-skeleton-card">
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line short"></div>
                        </div>
                        <div class="skeleton-card review-skeleton-card">
                            <div class="skeleton-line"></div>
                            <div class="skeleton-line short"></div>
                        </div>
                    </div>
                    <p class="reviews-cta">هل عملنا معاً؟ <a href="client/write-review.html">شاركنا رأيك</a></p>
                </section>

                <section id="contact" class="contact-section" data-aos="fade-up">
                    <div class="contact-info">
                        <h2 class="section-title">لنصنع حكاية جديدة</h2>
                        <p>تواصل معي لنبدأ مشروعك القادم ونروي معاً قصة نجاح.</p>
                        <div id="dynamic-contact-info">
                            <div class="skeleton-line" style="height:20px; width:60%;"></div>
                        </div>
                    </div>
                    <div class="contact-form">
                        <div id="form-status" class="form-status" role="alert"></div>
                        <form id="public-contact-form">
                            <div class="form-group">
                                <label for="contact-name">الاسم</label>
                                <input type="text" id="contact-name" placeholder="اسمك الكريم" required>
                            </div>
                            <div class="form-group">
                                <label for="contact-email-input">البريد الإلكتروني</label>
                                <input type="email" id="contact-email-input" placeholder="example@email.com" required>
                            </div>
                            <div class="form-group">
                                <label for="contact-message">رسالتك</label>
                                <textarea id="contact-message" rows="4" placeholder="اكتب رسالتك هنا..."
                                    required></textarea>
                            </div>
                            <button type="submit" class="btn" style="width: 100%;">إرسال الرسالة</button>
                        </form>
                    </div>
                </section>
            </div>
        </template>

        <main id="app-root"></main>
        <script>
            (function () {
                var tpl = document.getElementById('home-shell');
                var root = document.getElementById('app-root');
                if (tpl && root) root.innerHTML = tpl.innerHTML;
            })();
        </script>

        <footer class="site-footer">
            <div class="footer-grid">
                <div class="footer-brand">
                    <a href="#home" class="footer-logo">
                        <img src="assets/logo.png" alt="جذع" loading="lazy" width="40" height="40">
                        <span>جذع <span style="color: var(--accent-dark);">.</span></span>
                    </a>
                    <p>أروي حكايات برمجية بروح فنية. تتأصل الأفكار وتنمو كالأشجار.</p>
                </div>
                <div class="footer-links">
                    <h3>روابط سريعة</h3>
                    <a href="#home">الرئيسية</a>
                    <a href="#services">الخدمات</a>
                    <a href="#projects">المشاريع</a>
                    <a href="#articles">المقالات</a>
                    <a href="#contact">تواصل معي</a>
                    <a href="client/write-review.html">اكتب رأيك</a>
                    <a href="donation">الدعم والمساهمة 🌱</a>
                </div>
                <div class="footer-contact">
                    <h3>تواصل معي</h3>
                    <div id="footer-contact-info">
                        <p>جاري التحميل...</p>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>حكاية جذع &copy; 2026. جميع الحقوق محفوظة.</p>
            </div>
        </footer>
    </div>

    <button id="back-to-top" title="العودة للأعلى" aria-label="العودة للأعلى">
        <i class="fas fa-arrow-up"></i>
    </button>

        import { initUI } from './js/ui.js';
        initUI();
