<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <base href="/">
    <title>حدث خطأ - جذع</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0;
            line-height: 1;
            position: relative;
            z-index: 2;
            text-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        [data-theme="dark"] .error-code {
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .error-title {
            font-size: 2rem;
            margin-top: 10px;
            color: var(--text-dark);
            z-index: 2;
        }

        .error-desc {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-top: 15px;
            max-width: 500px;
            line-height: 1.6;
            z-index: 2;
        }

        .error-actions {
            margin-top: 30px;
            z-index: 2;
        }

        /* Animation for falling leaf and broken branch */
        .broken-branch {
            position: absolute;
            font-size: 12rem;
            color: var(--primary);
            opacity: 0.1;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(15deg);
            z-index: 0;
        }

        .falling-leaf {
            position: absolute;
            font-size: 3rem;
            color: var(--secondary);
            z-index: 1;
            top: 30%;
            animation: fall 5s infinite ease-in-out;
        }
        
        .leaf-1 { left: 40%; animation-delay: 0s; }
        .leaf-2 { left: 55%; animation-delay: 2s; font-size: 2rem; }
        .leaf-3 { left: 48%; animation-delay: 4s; font-size: 2.5rem; color: #d4a373; }

        @keyframes fall {
            0% {
                transform: translateY(-50px) rotate(0deg) translateX(0);
                opacity: 1;
            }
            50% {
                transform: translateY(150px) rotate(180deg) translateX(30px);
                opacity: 0.8;
            }
            100% {
                transform: translateY(300px) rotate(360deg) translateX(-30px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="index.html" class="logo logo-link">
                <img src="assets/logo.png" alt="جذع" width="48" height="48">
                <div class="logo-text">جذع <span>.</span></div>
            </a>
            <div class="header-right">
                <div class="header-actions">
                    <button id="theme-toggle" class="btn" aria-label="تبديل الوضع الليلي">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </header>

        <main>
            <section class="error-container glass-panel" style="margin-top: 100px; border-radius: 20px;">
                <i class="fas fa-code-branch broken-branch"></i>
                <i class="fas fa-leaf falling-leaf leaf-1"></i>
                <i class="fas fa-leaf falling-leaf leaf-2"></i>
                <i class="fas fa-leaf falling-leaf leaf-3"></i>
                
                <h1 class="error-code">عذراً!</h1>
                <h2 class="error-title">حدث خطأ ما (404/403)</h2>
                <p class="error-desc">يبدو أن الغصن الذي تبحث عنه قد انكسر، أو أن الصفحة غير موجودة، أو لا تملك صلاحية الوصول إليها. لا تقلق، جذورنا لا تزال قوية!</p>
                
                <div class="error-actions">
                    <a href="index.html" class="btn"><i class="fas fa-home"></i> العودة للرئيسية</a>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        document.addEventListener('DOMContentLoaded', () => {
            // Theme setup
            const themeBtn = document.getElementById('theme-toggle');
            let isDark = localStorage.getItem('theme') === 'dark';
            if (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                isDark = true;
            }
            document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
            themeBtn.querySelector('i').className = isDark ? 'fas fa-sun' : 'fas fa-moon';

            themeBtn.addEventListener('click', () => {
                isDark = !isDark;
                document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeBtn.querySelector('i').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            });
        });
    </script>
</body>
</html>
