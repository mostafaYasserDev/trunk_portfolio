<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <base href="/">
    <meta name="robots" content="noindex, follow">
    <title>الصفحة غير موجودة - جذع</title>
    
    <link rel="icon" href="/assets/logo.png" type="image/png">
    <meta name="theme-color" content="#8C5A35">
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .error-404-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: 2rem;
        }
        .error-404-title {
            font-size: 8rem;
            color: var(--accent-color);
            margin: 0;
            line-height: 1;
            font-weight: bold;
        }
        .error-404-text {
            font-size: 1.5rem;
            color: var(--text-color);
            margin: 1rem 0 2rem;
        }
        .error-404-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--accent-color);
            color: #fff;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .error-404-btn:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(140, 90, 53, 0.4);
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <a href="/" class="logo logo-link">
                <img src="/assets/logo.png" alt="جذع" fetchpriority="high" width="48" height="48">
                <div class="logo-text">جذع <span>.</span></div>
            </a>
        </header>

        <main id="app-root">
            <div class="error-404-container fade-in">
                <h1 class="error-404-title">404</h1>
                <p class="error-404-text">عذراً، الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>
                <a href="/" class="error-404-btn">
                    <i class="fas fa-home"></i> العودة للرئيسية
                </a>
            </div>
        </main>

        <footer class="site-footer" style="margin-top: auto;">
            <div class="footer-bottom">
                <p>حكاية جذع &copy; 2026. جميع الحقوق محفوظة.</p>
            </div>
        </footer>
    </div>

</body>
</html>
